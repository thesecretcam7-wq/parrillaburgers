<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer circle ring -->
  <circle cx="100" cy="100" r="94" stroke="white" stroke-width="5" fill="none"/>

  <!-- Inner decorative circle (thin) -->
  <circle cx="100" cy="100" r="86" stroke="white" stroke-width="1.2" fill="none" opacity="0.4"/>

  <!-- PARRILLA text curved at top -->
  <defs>
    <path id="topArc" d="M 30,100 A 70,70 0 0,1 170,100"/>
  </defs>
  <text font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="6">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">PARRILLA</textPath>
  </text>

  <!-- Swoosh / underline accent below Burgers -->
  <path d="M 42 128 Q 100 138 158 128" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- "Burgers" main script text -->
  <text x="100" y="122"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="900"
    font-style="italic"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1">Burgers</text>

  <!-- Grill icon at bottom -->
  <!-- Grill lid -->
  <path d="M 72 153 Q 100 140 128 153" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Grill body -->
  <rect x="72" y="153" width="56" height="12" rx="2" stroke="white" stroke-width="2" fill="none"/>
  <!-- Grill handle top -->
  <line x1="100" y1="153" x2="100" y2="147" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="145" r="2.5" fill="white"/>
  <!-- Grill legs -->
  <line x1="82" y1="165" x2="76" y2="178" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="118" y1="165" x2="124" y2="178" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Cross bar between legs -->
  <line x1="80" y1="172" x2="120" y2="172" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>
